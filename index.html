<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
  <title>Death Battle · Debat Epik 3D</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@500;600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --void: #010101;
      --abyss: #040404;
      --deep: #090909;
      --surface: #0f0f0f;
      --elevated: #171717;
      --overlay: #1f1f1f;
      --border-dim: rgba(255,255,255,0.025);
      --border-subtle: rgba(255,255,255,0.055);
      --border-medium: rgba(255,255,255,0.11);
      --text-dim: #606060;
      --text-secondary: #8a8a8a;
      --text-primary: #b8b8b8;
      --text-bright: #f0f0f0;
      --accent-red: #ff4d5a;
      --accent-green: #4caf50;
      --glass-bg: rgba(12,12,12,0.55);
      --glass-bg-hover: rgba(18,18,18,0.7);
      --glass-border: rgba(255,255,255,0.035);
      --glass-border-hover: rgba(255,255,255,0.09);
      --shadow-1: 0 10px 28px rgba(0,0,0,0.85), 0 2px 10px rgba(0,0,0,0.65);
      --shadow-2: 0 18px 44px rgba(0,0,0,0.92), 0 4px 18px rgba(0,0,0,0.75);
      --shadow-3: 0 28px 60px rgba(0,0,0,0.96), 0 6px 26px rgba(0,0,0,0.85);
      --shadow-inset: inset 0 1px 0 rgba(255,255,255,0.02);
      --font-body: 'Inter', system-ui, -apple-system, sans-serif;
      --font-display: 'Orbitron', 'Rajdhani', sans-serif;
      --font-mono: 'Rajdhani', monospace;
      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;
      --radius-full: 9999px;
      --transition-fast: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-smooth: 0.32s cubic-bezier(0.25, 0.8, 0.25, 1);
      --transition-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      --texture-noise: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.98' numOctaves='6' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
    }

    *::selection {
      background: rgba(190,190,190,0.16);
      color: #fff;
    }

    *::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }
    *::-webkit-scrollbar-track {
      background: var(--abyss);
      border-radius: 4px;
      margin: 4px;
    }
    *::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #484848 0%, #2e2e2e 100%);
      border-radius: 4px;
      border: 2px solid var(--abyss);
    }
    *::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #5e5e5e 0%, #484848 100%);
    }

    body {
      font-family: var(--font-body);
      background: var(--void);
      background-image:
        radial-gradient(ellipse at 35% 15%, rgba(255,255,255,0.01) 0%, transparent 65%),
        radial-gradient(ellipse at 65% 85%, rgba(255,255,255,0.01) 0%, transparent 65%),
        var(--texture-noise);
      background-attachment: fixed;
      color: var(--text-primary);
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.01em;
      position: relative;
      perspective: 1200px;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.004) 2px, rgba(255,255,255,0.004) 4px),
        repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,255,255,0.003) 2px, rgba(255,255,255,0.003) 4px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.8;
    }

    #app {
      position: relative;
      z-index: 1;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      transform-style: preserve-3d;
    }

    .hidden {
      display: none !important;
    }

    .page {
      display: none;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      background: transparent;
      animation: pageReveal 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
      position: relative;
      transform-style: preserve-3d;
    }
    .page.active {
      display: flex;
    }

    @keyframes pageReveal {
      from {
        opacity: 0;
        transform: translateY(48px) scale(0.9) rotateX(5deg);
        filter: blur(22px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1) rotateX(0deg);
        filter: blur(0);
      }
    }

    .header {
      background: rgba(3,3,3,0.78);
      backdrop-filter: blur(50px) saturate(260%);
      -webkit-backdrop-filter: blur(50px) saturate(260%);
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.025);
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 8px 40px rgba(0,0,0,0.95), var(--shadow-inset);
      z-index: 10;
      position: relative;
      transform-style: preserve-3d;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 5%;
      width: 90%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    }
    .header h2,
    .header h3 {
      font-weight: 700;
      color: var(--text-bright);
      font-family: var(--font-display);
      letter-spacing: 0.09em;
      text-shadow: 0 4px 24px rgba(0,0,0,0.95), 0 0 28px rgba(255,255,255,0.12);
      font-size: 1.28rem;
      transform: translateZ(8px);
    }

    .container {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 24px 20px;
      max-width: 760px;
      margin: auto;
      width: 100%;
      scroll-behavior: smooth;
      position: relative;
      transform-style: preserve-3d;
    }

    .btn {
      background: rgba(18,18,18,0.68);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      color: var(--text-bright);
      border: 1px solid rgba(255,255,255,0.065);
      padding: 14px 24px;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-weight: 600;
      font-family: var(--font-body);
      font-size: 0.95rem;
      letter-spacing: 0.045em;
      transition: all var(--transition-smooth);
      width: 100%;
      text-align: center;
      margin: 5px 0;
      transform: translateY(0) translateZ(0);
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-1);
      transform-style: preserve-3d;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 55%);
      pointer-events: none;
      border-radius: inherit;
      transition: opacity var(--transition-fast);
      opacity: 0;
    }
    .btn:hover::before {
      opacity: 1;
    }
    .btn:hover {
      background: rgba(26,26,26,0.82);
      border-color: rgba(255,255,255,0.14);
      color: #fff;
      transform: translateY(-5px) translateZ(4px);
      box-shadow: var(--shadow-2), 0 0 0 1px rgba(255,255,255,0.03) inset;
    }
    .btn:active {
      transform: translateY(-1px) scale(0.97) translateZ(0);
      transition: all 0.1s ease;
    }

    .btn-primary {
      background: linear-gradient(145deg, #313131 0%, #1c1c1c 50%, #101010 100%);
      color: #fff;
      border-color: rgba(255,255,255,0.13);
      font-weight: 700;
      box-shadow: 0 8px 28px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.04) inset;
      text-shadow: 0 2px 4px rgba(0,0,0,0.75);
      letter-spacing: 0.07em;
    }
    .btn-primary:hover {
      background: linear-gradient(145deg, #424242 0%, #2e2e2e 50%, #202020 100%);
      box-shadow: 0 12px 40px rgba(0,0,0,0.95), 0 0 0 1px rgba(255,255,255,0.05) inset;
      transform: translateY(-6px) translateZ(5px);
    }

    .btn-outline {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.08);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }
    .btn-outline:hover {
      background: rgba(255,255,255,0.03);
      border-color: rgba(255,255,255,0.18);
    }

    .btn-link {
      background: none;
      border: none;
      color: var(--text-dim);
      font-weight: 500;
      box-shadow: none;
      padding: 10px 16px;
    }
    .btn-link:hover {
      background: rgba(255,255,255,0.02);
      color: var(--text-bright);
      box-shadow: none;
      transform: none;
    }

    .btn-danger {
      color: var(--accent-red);
      border-color: rgba(255, 77, 90, 0.28);
      background: rgba(255, 60, 70, 0.045);
    }
    .btn-danger:hover {
      background: rgba(255, 60, 70, 0.12);
      border-color: rgba(255, 77, 90, 0.52);
      box-shadow: 0 0 30px rgba(255, 60, 70, 0.18);
      color: #ff6b7a;
    }

    .btn-sm {
      padding: 10px 18px;
      font-size: 0.85rem;
      border-radius: var(--radius-sm);
      width: auto;
      margin: 3px;
      letter-spacing: 0.055em;
    }

    .input,
    textarea {
      background: rgba(10,10,10,0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1.5px solid rgba(255,255,255,0.035);
      color: var(--text-bright);
      padding: 14px 18px;
      border-radius: var(--radius-md);
      width: 100%;
      font-size: 0.95rem;
      font-family: var(--font-body);
      margin: 7px 0;
      transition: all var(--transition-smooth);
      letter-spacing: 0.025em;
      box-shadow: 0 4px 16px rgba(0,0,0,0.65) inset;
      transform: translateZ(0);
    }
    .input:focus,
    textarea:focus {
      outline: none;
      border-color: rgba(240,240,240,0.4);
      box-shadow: 0 0 0 5px rgba(255,255,255,0.02), 0 0 32px rgba(255,255,255,0.06), 0 4px 16px rgba(0,0,0,0.65) inset;
      background: rgba(16,16,16,0.82);
    }
    .input::placeholder,
    textarea::placeholder {
      color: rgba(140,140,140,0.26);
      font-weight: 400;
      letter-spacing: 0.045em;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
      line-height: 1.6;
    }

    .card {
      background: rgba(14,14,14,0.58);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,0.025);
      border-radius: var(--radius-lg);
      padding: 20px 22px;
      margin-bottom: 18px;
      box-shadow: var(--shadow-1);
      transition: all var(--transition-bounce);
      position: relative;
      overflow: hidden;
      transform-style: preserve-3d;
      transform: translateY(0) rotateX(0deg) scale(1);
    }
    .card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent);
      pointer-events: none;
    }
    .card:hover {
      transform: translateY(-9px) rotateX(3deg) scale(1.025);
      box-shadow: var(--shadow-3), 0 0 0 1px rgba(255,255,255,0.06) inset;
      border-color: rgba(255,255,255,0.07);
    }

    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(145deg, #323232 0%, #181818 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-family: var(--font-display);
      font-size: 1.35rem;
      border: 2px solid rgba(255,255,255,0.09);
      box-shadow: 0 0 28px rgba(255,255,255,0.03), var(--shadow-1);
      color: var(--text-primary);
      letter-spacing: 0.08em;
      flex-shrink: 0;
      transform: translateZ(5px);
    }

    .row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .online-chip {
      background: rgba(20,20,20,0.52);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 6px 18px;
      border-radius: var(--radius-full);
      border: 1px solid rgba(255,255,255,0.045);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.07em;
      color: var(--text-secondary);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow-1);
    }

    .tag {
      color: #dcdcdc;
      font-weight: 700;
      background: rgba(255,255,255,0.065);
      padding: 3px 10px;
      border-radius: 7px;
      font-size: 0.85em;
      letter-spacing: 0.035em;
    }

    .chat-bubble {
      max-width: 86%;
      padding: 16px 20px;
      border-radius: 22px;
      margin: 14px 0;
      border: 1px solid rgba(255,255,255,0.045);
      word-wrap: break-word;
      animation: bubblePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      position: relative;
      line-height: 1.62;
      font-size: 0.94rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.65);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transform-style: preserve-3d;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
    }
    .chat-bubble:hover {
      transform: translateY(-3px) translateZ(4px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.75);
    }
    @keyframes bubblePop {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.86) rotateX(5deg);
        filter: blur(5px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1) rotateX(0deg);
        filter: blur(0);
      }
    }
    .system {
      background: rgba(32,32,32,0.72);
      border-color: rgba(255,255,255,0.02);
      color: #a5a5a5;
      align-self: center;
      font-style: italic;
      border-radius: 16px;
      font-size: 0.85rem;
      letter-spacing: 0.035em;
    }
    .my-msg {
      background: rgba(50,50,50,0.78);
      align-self: flex-end;
      border-bottom-right-radius: 8px;
      border-color: rgba(255,255,255,0.11);
      box-shadow: 0 8px 24px rgba(0,0,0,0.75);
    }
    .other-msg {
      background: rgba(18,18,18,0.78);
      align-self: flex-start;
      border-bottom-left-radius: 8px;
      border-color: rgba(255,255,255,0.04);
    }

    img {
      max-width: 220px;
      border-radius: 16px;
      margin-top: 10px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: transform var(--transition-bounce), box-shadow var(--transition-smooth);
      box-shadow: 0 10px 32px rgba(0,0,0,0.75);
      object-fit: cover;
      transform: translateZ(0);
    }
    img:hover {
      transform: scale(1.08) translateZ(7px);
      box-shadow: 0 14px 42px rgba(0,0,0,0.85), 0 0 0 2px rgba(255,255,255,0.04);
    }

    .tabs {
      display: flex;
      gap: 12px;
      margin: 24px 0;
      flex-wrap: wrap;
    }
    .tab {
      padding: 12px 24px;
      border-radius: var(--radius-full);
      background: rgba(12,12,12,0.62);
      cursor: pointer;
      border: 1.5px solid rgba(255,255,255,0.035);
      transition: all var(--transition-smooth);
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.055em;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--text-dim);
      transform-style: preserve-3d;
      transform: translateZ(0);
    }
    .tab.active {
      background: linear-gradient(145deg, #353535 0%, #222222 100%);
      color: #fff;
      border-color: rgba(255,255,255,0.15);
      box-shadow: 0 8px 24px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.03) inset;
      text-shadow: 0 2px 4px rgba(0,0,0,0.65);
      transform: translateY(-2px) translateZ(4px);
    }
    .tab:hover:not(.active) {
      background: rgba(20,20,20,0.78);
      border-color: rgba(255,255,255,0.09);
      transform: translateY(-1px);
    }

    .icon-btn {
      background: rgba(255,255,255,0.008);
      border: 1px solid rgba(255,255,255,0.025);
      color: #aaa;
      font-size: 1.25em;
      cursor: pointer;
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all var(--transition-smooth);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      position: relative;
      transform-style: preserve-3d;
    }
    .icon-btn:hover {
      background: rgba(255,255,255,0.07);
      color: #fff;
      box-shadow: 0 0 20px rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.11);
      transform: scale(1.14) translateZ(4px);
    }

    .badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #ff4d5a;
      color: #fff;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: badgePulse 1.8s ease-in-out infinite;
      box-shadow: 0 0 20px rgba(255, 60, 70, 0.5);
      letter-spacing: 0;
      border: 2px solid #0a0a0a;
    }
    @keyframes badgePulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 12px rgba(255,60,70,0.4); }
      50% { transform: scale(1.32); box-shadow: 0 0 30px rgba(255,60,70,0.72); }
    }

    .fab {
      position: fixed;
      bottom: 34px;
      right: 34px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(145deg, #323232 0%, #191919 100%);
      border: 1px solid rgba(255,255,255,0.09);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      cursor: pointer;
      box-shadow: var(--shadow-2), 0 0 0 1px rgba(255,255,255,0.01) inset;
      z-index: 30;
      transition: all var(--transition-bounce);
      color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.55);
      transform-style: preserve-3d;
    }
    .fab:hover {
      transform: scale(1.2) rotate(16deg) translateZ(10px);
      box-shadow: var(--shadow-3), 0 0 0 1px rgba(255,255,255,0.03) inset;
    }
    .fab:active {
      transform: scale(0.93) rotate(0deg);
    }

    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeOverlay 0.25s ease both;
      perspective: 1400px;
    }
    @keyframes fadeOverlay {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .popup {
      background: rgba(26,26,26,0.92);
      backdrop-filter: blur(34px);
      -webkit-backdrop-filter: blur(34px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius-xl);
      padding: 34px 30px;
      max-width: 470px;
      width: 92%;
      box-shadow: var(--shadow-3), 0 0 0 1px rgba(255,255,255,0.02) inset;
      animation: popupReveal 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      transform-style: preserve-3d;
    }
    @keyframes popupReveal {
      from { transform: scale(0.6) translateY(70px) rotateX(14deg); opacity: 0; filter: blur(16px); }
      to { transform: scale(1) translateY(0) rotateX(0deg); opacity: 1; filter: blur(0); }
    }
    .popup h3 {
      margin-bottom: 20px;
      color: var(--text-bright);
      font-family: var(--font-display);
      letter-spacing: 0.09em;
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    }
    .popup-buttons {
      display: flex;
      gap: 14px;
      justify-content: flex-end;
      margin-top: 30px;
    }

    .logo-3d {
      font-size: 4.8em;
      margin-bottom: 20px;
      color: #f2f2f2;
      text-shadow: 0 8px 32px rgba(0,0,0,0.95), 0 14px 70px rgba(255,255,255,0.18);
      transform: perspective(800px) rotateY(18deg) rotateX(-9deg);
      transition: transform var(--transition-bounce);
      animation: logoFloat 5.5s ease-in-out infinite;
    }
    @keyframes logoFloat {
      0%, 100% { transform: perspective(800px) rotateY(18deg) rotateX(-9deg) translateY(0); }
      50% { transform: perspective(800px) rotateY(18deg) rotateX(-9deg) translateY(-18px); }
    }
    .logo-3d:hover {
      transform: perspective(800px) rotateY(24deg) rotateX(-13deg) scale(1.07);
    }

    .title-3d {
      font-weight: 900;
      font-family: var(--font-display);
      letter-spacing: 0.16em;
      font-size: 3.2rem;
      text-shadow: 0 8px 28px rgba(0,0,0,0.95), 0 0 65px rgba(255,255,255,0.22);
      background: linear-gradient(180deg, #fcfcfc 0%, #b8b8b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transform: translateZ(16px);
    }

    .subtitle {
      color: #a8a8a8;
      margin-bottom: 40px;
      font-weight: 400;
      letter-spacing: 0.11em;
      font-size: 1.04rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.85);
    }

    .pulse {
      animation: iconPulse 1.8s ease-in-out infinite;
    }
    @keyframes iconPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(1.55); }
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(140,140,140,0.22);
      font-weight: 400;
      letter-spacing: 0.045em;
    }

    @media (max-width: 480px) {
      .container { padding: 16px 14px; }
      .header { padding: 12px 16px; }
      .header h2, .header h3 { font-size: 1rem; }
      .btn { padding: 12px 20px; font-size: 0.9rem; }
      .card { padding: 16px 18px; }
      .logo-3d { font-size: 3.4em; }
      .title-3d { font-size: 2.1rem; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loginPage" class="page active container" style="justify-content:center; text-align:center">
      <div style="max-width:440px;width:100%">
        <div class="logo-3d"><i class="fas fa-fist-raised"></i></div>
        <h1 class="title-3d">DEATH BATTLE</h1>
        <p class="subtitle">Debat Karakter Epik · Siapa Pemenangnya?</p>
        <input id="loginEmail" class="input" type="email" placeholder="Alamat Email" autocomplete="email" style="text-align:left">
        <input id="loginPass" class="input" type="password" placeholder="Kata Sandi" autocomplete="current-password" style="text-align:left">
        <button class="btn btn-primary" onclick="loginEmail()"><i class="fas fa-sign-in-alt" style="margin-right:8px"></i> Masuk</button>
        <button class="btn btn-outline" onclick="loginGoogle()"><i class="fab fa-google" style="margin-right:8px"></i> Masuk dengan Google</button>
        <button class="btn btn-link" onclick="showPage('registerPage')">Belum punya akun? <b>Daftar Sekarang</b></button>
      </div>
    </div>
    <div id="registerPage" class="page container" style="justify-content:center">
      <div style="max-width:440px;width:100%">
        <h2 style="margin-bottom:30px;font-family:var(--font-display);letter-spacing:0.1em;text-align:center">Buat Akun Baru</h2>
        <input id="regEmail" class="input" type="email" placeholder="Alamat Email" autocomplete="email">
        <input id="regUser" class="input" placeholder="Username Keren" autocomplete="username">
        <input id="regPass" class="input" type="password" placeholder="Kata Sandi" autocomplete="new-password">
        <button class="btn btn-primary" onclick="register()"><i class="fas fa-user-plus" style="margin-right:8px"></i> Daftar</button>
        <button class="btn btn-outline" onclick="showPage('loginPage')"><i class="fas fa-arrow-left" style="margin-right:8px"></i> Kembali ke Login</button>
      </div>
    </div>
    <div id="dashboardPage" class="page">
      <div class="header">
        <h2><i class="fas fa-fist-raised" style="margin-right:10px"></i> DEATH BATTLE</h2>
        <div class="row">
          <div style="position:relative">
            <button class="icon-btn" onclick="showPage('notifPage')" title="Notifikasi"><i class="fas fa-bell"></i></button>
            <span id="notifBadge" class="badge hidden">0</span>
          </div>
          <button id="adminBtn" class="icon-btn hidden" onclick="showPage('adminPage')" title="Panel Admin"><i class="fas fa-shield-haltered"></i></button>
          <button class="icon-btn" onclick="showPage('profilePage')" title="Profil"><i class="fas fa-user-astronaut"></i></button>
        </div>
      </div>
      <div class="container">
        <div id="announceBanner" class="card hidden" style="border-left:5px solid #888"></div>
        <div class="row" style="justify-content:space-between;margin:26px 0;align-items:center">
          <h3 style="font-family:var(--font-display);letter-spacing:0.08em">Arena Debat</h3>
          <span id="onlineCount" class="online-chip"><i class="fas fa-circle pulse" style="color:#4caf50;font-size:10px"></i> Loading...</span>
        </div>
        <button class="btn btn-outline" onclick="showPage('lobbyPage')" style="margin-bottom:26px;border-style:dashed">
          <i class="fas fa-search" style="margin-right:10px"></i> Cari Lawan Debat
        </button>
        <h4 style="margin-bottom:16px;color:var(--text-dim);letter-spacing:0.07em">Debat Aktif</h4>
        <div id="groupList"></div>
      </div>
      <div class="fab" onclick="showPage('createGroupPage')" title="Buat Debat Baru"><i class="fas fa-plus"></i></div>
    </div>
    <div id="createGroupPage" class="page container">
      <div class="header" style="padding:0 0 18px 0;background:transparent;backdrop-filter:none;border:none;box-shadow:none">
        <button onclick="showPage('dashboardPage')" class="icon-btn"><i class="fas fa-arrow-left"></i></button>
        <h2>Buat Debat Epik</h2>
        <span></span>
      </div>
      <input id="cgTitle" class="input" placeholder="Judul Debat (contoh: Naruto vs Sasuke)" required>
      <input id="cgChar1" class="input" placeholder="Nama Karakter 1" required>
      <input id="cgChar1Img" class="input" placeholder="URL Gambar Karakter 1 (opsional)">
      <input id="cgChar2" class="input" placeholder="Nama Karakter 2" required>
      <input id="cgChar2Img" class="input" placeholder="URL Gambar Karakter 2 (opsional)">
      <input id="cgGroupImg" class="input" placeholder="URL Foto Grup / Banner (opsional)">
      <textarea id="cgRules" class="input" rows="4" placeholder="Aturan Debat... (contoh: Tidak ada serangan personal, maksimal 5 argumen)" required></textarea>
      <div class="row" style="justify-content:space-between;margin:18px 0;gap:10px">
        <button class="btn btn-sm btn-outline" onclick="pickDebater(1)"><i class="fas fa-user-plus"></i> Pilih Pendebat 1</button>
        <button class="btn btn-sm btn-outline" onclick="pickDebater(2)"><i class="fas fa-user-plus"></i> Pilih Pendebat 2</button>
      </div>
      <div id="debater1Info" class="hidden card" style="border-left:5px solid #aaa">Pendebat 1: <span></span></div>
      <div id="debater2Info" class="hidden card" style="border-left:5px solid #aaa">Pendebat 2: <span></span></div>
      <button class="btn btn-primary" onclick="createGroup()"><i class="fas fa-bolt" style="margin-right:10px"></i> Mulai Debat!</button>
    </div>
    <div id="groupDetailPage" class="page">
      <div class="header">
        <button onclick="showPage('dashboardPage')" class="icon-btn"><i class="fas fa-arrow-left"></i></button>
        <h3 id="gdTitle"></h3>
        <div id="gdActions" class="row"></div>
      </div>
      <div id="gdImages" class="row container" style="height:150px;overflow-x:auto;padding:0 0 16px 0;gap:14px;scroll-snap-type:x mandatory"></div>
      <div id="chatArea" class="container" style="flex:1;padding-top:0;display:flex;flex-direction:column;gap:8px"></div>
      <div class="container" style="display:flex;gap:14px;padding-top:0;align-items:center">
        <input id="chatInput" class="input" placeholder="Ketik argumenmu..." style="margin:0;flex:1">
        <button class="btn btn-sm btn-outline" onclick="sendImageUrl()" title="Kirim Gambar"><i class="fas fa-image"></i></button>
        <button class="btn btn-sm btn-primary" onclick="sendMessage()" title="Kirim Pesan"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
    <div id="profilePage" class="page container" style="justify-content:center;text-align:center">
      <div style="max-width:440px;width:100%">
        <div id="profilePic" class="avatar" style="width:140px;height:140px;font-size:3em;margin:auto;border-width:3px"></div>
        <h3 id="profileName" style="margin-top:26px;font-family:var(--font-display);letter-spacing:0.09em"></h3>
        <p id="profileEmail" style="color:var(--text-dim);font-size:0.9rem"></p>
        <div class="row" style="justify-content:center;margin:38px 0;gap:60px">
          <div style="text-align:center"><b id="profileWins" style="font-size:2.4rem;color:#ececec;font-family:var(--font-display)">0</b><br><small style="color:var(--text-secondary)">Menang</small></div>
          <div style="text-align:center"><b id="profileLosses" style="font-size:2.4rem;color:var(--accent-red);font-family:var(--font-display)">0</b><br><small style="color:var(--text-secondary)">Kalah</small></div>
        </div>
        <button class="btn btn-outline" onclick="showPage('editProfilePage')"><i class="fas fa-edit" style="margin-right:10px"></i> Edit Profil</button>
        <button class="btn btn-outline btn-danger" onclick="signOut()"><i class="fas fa-sign-out-alt" style="margin-right:10px"></i> Keluar</button>
      </div>
    </div>
    <div id="editProfilePage" class="page container" style="justify-content:center">
      <div style="max-width:440px;width:100%">
        <h2 style="font-family:var(--font-display);letter-spacing:0.1em;margin-bottom:26px">Edit Profil</h2>
        <input id="epUrl" class="input" placeholder="URL Foto Profil (opsional)">
        <input id="epUser" class="input" placeholder="Username Baru">
        <button class="btn btn-primary" onclick="saveProfile()"><i class="fas fa-save" style="margin-right:10px"></i> Simpan Perubahan</button>
        <button class="btn btn-outline" onclick="showPage('profilePage')">Kembali</button>
      </div>
    </div>
    <div id="lobbyPage" class="page container">
      <div class="header" style="padding:0 0 18px 0;background:transparent;backdrop-filter:none;border:none;box-shadow:none">
        <button onclick="showPage('dashboardPage')" class="icon-btn"><i class="fas fa-arrow-left"></i></button>
        <h2>Papan Pencarian</h2>
        <button class="btn btn-sm btn-outline" onclick="showPage('createLobbyPage')">Pasang Iklan</button>
      </div>
      <div id="lobbyList"></div>
    </div>
    <div id="createLobbyPage" class="page container" style="justify-content:center">
      <div style="max-width:440px;width:100%">
        <h2 style="font-family:var(--font-display);letter-spacing:0.1em;margin-bottom:26px">Cari Lawan Baru</h2>
        <input id="clChar" class="input" placeholder="Karakter yang dicari" required>
        <input id="clTier" class="input" placeholder="Tier (S, A, B, C)" required>
        <input id="clJudge" class="input" placeholder="Nama Judge (opsional)">
        <input id="clRoom" class="input" placeholder="Link Room Chat (opsional)">
        <button class="btn btn-primary" onclick="createLobby()"><i class="fas fa-bullhorn" style="margin-right:10px"></i> Pasang Iklan</button>
        <button class="btn btn-outline" onclick="showPage('lobbyPage')">Kembali</button>
      </div>
    </div>
    <div id="notifPage" class="page container">
      <div class="header" style="padding:0 0 18px 0;background:transparent;backdrop-filter:none;border:none;box-shadow:none">
        <button onclick="showPage('dashboardPage')" class="icon-btn"><i class="fas fa-arrow-left"></i></button>
        <h2>Notifikasi</h2>
        <span></span>
      </div>
      <div id="notifList"></div>
    </div>
    <div id="adminPage" class="page container">
      <div class="header" style="padding:0 0 18px 0;background:transparent;backdrop-filter:none;border:none;box-shadow:none">
        <button onclick="showPage('dashboardPage')" class="icon-btn"><i class="fas fa-arrow-left"></i></button>
        <h2>Panel Admin</h2>
        <span></span>
      </div>
      <div class="tabs">
        <div id="tabAnnounce" class="tab active" onclick="adminTab('announce')">Pengumuman</div>
        <div id="tabNotif" class="tab" onclick="adminTab('notif')">Notifikasi</div>
        <div id="tabUsers" class="tab" onclick="adminTab('users')">Pengguna</div>
      </div>
      <div id="adminContent"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, query, where, orderBy, limit, serverTimestamp, increment, arrayUnion, writeBatch, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAaqhwVyiFRkYSMjtCQlgGGrsZBBIgHJiM",
      authDomain: "death-aec26.firebaseapp.com",
      projectId: "death-aec26",
      storageBucket: "death-aec26.firebasestorage.app",
      messagingSenderId: "957128428992",
      appId: "1:957128428992:web:72e1573167fc8500f54c25"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    let currentUser = null, currentUserModel = null, currentGroupId = null, pickDebater1 = null, pickDebater2 = null;

    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        await updateDoc(doc(db, "users", user.uid), { lastSeen: serverTimestamp() });
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists()) {
          currentUserModel = { uid: user.uid, ...snap.data() };
          if (currentUserModel.banned) { await signOut(auth); return; }
          document.getElementById('adminBtn').classList.toggle('hidden', currentUserModel.role !== 'admin');
        }
        showPage('dashboardPage');
      } else {
        currentUserModel = null;
        document.getElementById('adminBtn').classList.add('hidden');
        showPage('loginPage');
      }
    });

    window.showPage = (id) => {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      if (id === 'dashboardPage') loadDashboard();
      if (id === 'groupDetailPage') loadGroupDetail();
      if (id === 'profilePage') loadProfile();
      if (id === 'editProfilePage') loadEditProfile();
      if (id === 'lobbyPage') loadLobbies();
      if (id === 'notifPage') loadNotifications();
      if (id === 'adminPage') adminTab('announce');
    };

    window.loginEmail = async () => {
      const email = document.getElementById('loginEmail').value;
      const pass = document.getElementById('loginPass').value;
      try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { showPopup('Login Gagal', e.message); }
    };
    window.loginGoogle = async () => {
      try { await signInWithPopup(auth, googleProvider); } catch (e) { showPopup('Google Login Gagal', e.message); }
    };
    window.register = async () => {
      const email = document.getElementById('regEmail').value, pass = document.getElementById('regPass').value, username = document.getElementById('regUser').value;
      if (!email || !pass || !username) return showPopup('Error', 'Isi semua field');
      try {
        const res = await createUserWithEmailAndPassword(auth, email, pass);
        await setDoc(doc(db, "users", res.user.uid), { email, username, wins: 0, losses: 0, lastUsernameChange: serverTimestamp(), lastSeen: serverTimestamp(), role: 'user', banned: false });
      } catch (e) { showPopup('Daftar Gagal', e.message); }
    };
    window.signOut = () => signOut(auth);

    async function loadDashboard() {
      const fiveMin = new Date(Date.now() - 300000);
      onSnapshot(query(collection(db, "users"), where("lastSeen", ">=", fiveMin)), snap => {
        document.getElementById('onlineCount').innerHTML = `<i class="fas fa-circle pulse" style="color:#4caf50;font-size:10px"></i> ${snap.size} online`;
      });
      onSnapshot(query(collection(db, "announcements"), orderBy("createdAt", "desc"), limit(1)), snap => {
        const banner = document.getElementById('announceBanner');
        if (snap.empty) { banner.classList.add('hidden'); return; }
        banner.innerHTML = `<b style="color:#ccc">${snap.docs[0].data().title}</b><br><span style="color:#aaa">${snap.docs[0].data().body}</span>`;
        banner.classList.remove('hidden');
      });
      onSnapshot(query(collection(db, "groups"), where("status", "==", "active"), orderBy("createdAt", "desc")), snap => {
        document.getElementById('groupList').innerHTML = snap.docs.map(d => {
          const g = d.data(); g.id = d.id;
          return `<div class="card" onclick="openGroup('${g.id}')" style="cursor:pointer"><div class="row">
            ${g.groupPhotoURL ? `<img src="${g.groupPhotoURL}" style="width:68px;height:68px;border-radius:18px;object-fit:cover;flex-shrink:0">` : `<div class="avatar">${g.title[0]?.toUpperCase()||'?'}</div>`}
            <div style="flex:1;min-width:0"><b style="font-size:1.05rem">${g.title}</b><br><small style="color:var(--text-dim)">${g.character1} vs ${g.character2}</small><br><small style="color:var(--text-secondary)"><i class="fas fa-users"></i> ${g.members?.length||0} anggota</small></div></div></div>`;
        }).join('') || '<p style="color:var(--text-dim);text-align:center">Belum ada debat aktif. Jadilah yang pertama!</p>';
      });
      if (currentUser) {
        onSnapshot(collection(db, "notifications"), snap => {
          const c = snap.docs.filter(d => d.data().targetUserId === null || d.data().targetUserId === currentUser.uid).length;
          const badge = document.getElementById('notifBadge');
          badge.innerText = c;
          badge.classList.toggle('hidden', c === 0);
        });
      }
    }
    window.openGroup = (id) => { currentGroupId = id; showPage('groupDetailPage'); };

    async function loadGroupDetail() {
      if (!currentGroupId) return;
      const snap = await getDoc(doc(db, "groups", currentGroupId));
      if (!snap.exists()) return showPage('dashboardPage');
      const g = snap.data(); g.id = snap.id;
      document.getElementById('gdTitle').innerText = g.title;
      let img = '';
      if (g.groupPhotoURL) img += `<img src="${g.groupPhotoURL}" style="width:130px;height:130px;border-radius:20px;object-fit:cover;scroll-snap-align:start">`;
      if (g.character1ImageUrl) img += `<img src="${g.character1ImageUrl}" style="height:110px;border-radius:16px;scroll-snap-align:start">`;
      if (g.character2ImageUrl) img += `<img src="${g.character2ImageUrl}" style="height:110px;border-radius:16px;scroll-snap-align:start">`;
      document.getElementById('gdImages').innerHTML = img || '<span style="color:var(--text-dim)">Belum ada gambar</span>';
      let act = '';
      if (currentUser.uid === g.idJudgement && g.status === 'active' && !g.resultsDeclared) act += `<button class="btn btn-sm btn-primary" onclick="declareResults('${g.id}')">Umumkan Hasil</button>`;
      if (currentUser.uid === g.idJudgement && g.status === 'active') act += `<button class="btn btn-sm btn-outline" onclick="finishDebate('${g.id}')">Selesai Debat</button>`;
      if ((currentUser.uid === g.idDebater1 || currentUser.uid === g.idDebater2) && g.status === 'active' && !g.resultsDeclared) act += `<button class="btn btn-sm btn-danger" onclick="surrender('${g.id}')">Menyerah</button>`;
      if (!g.members.includes(currentUser.uid)) act += `<button class="btn btn-sm btn-outline" onclick="joinGroup('${g.id}')">Gabung Nonton</button>`;
      document.getElementById('gdActions').innerHTML = act;

      onSnapshot(query(collection(db, "groups", currentGroupId, "messages"), orderBy("timestamp")), snap => {
        const ca = document.getElementById('chatArea');
        ca.innerHTML = snap.docs.map(d => {
          const m = d.data(); m.id = d.id;
          let text = m.text.replace(/@(\w+)/g, '<span class="tag">@$1</span>');
          let im = '';
          if (m.imageUrl) im = `<img src="${m.imageUrl}" style="max-width:200px" loading="lazy">`;
          else { const match = text.match(/(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp|bmp))/i); if (match) im = `<img src="${match[0]}" style="max-width:200px" loading="lazy">`; }
          return `<div class="chat-bubble ${m.isSystem?'system':(m.senderId===currentUser.uid?'my-msg':'other-msg')}" oncontextmenu="deleteMsg(event,'${currentGroupId}','${m.id}')"><small style="color:var(--text-dim);font-weight:600">${m.senderUsername}</small><br>${text} ${im}</div>`;
        }).join('');
        ca.scrollTop = ca.scrollHeight;
      });
    }
    window.deleteMsg = async (e, gid, mid) => { e.preventDefault(); if (confirm('Hapus pesan ini?')) await deleteDoc(doc(db, "groups", gid, "messages", mid)); };
    window.sendMessage = async () => {
      const input = document.getElementById('chatInput');
      if (!input.value.trim() || !currentGroupId) return;
      await addDoc(collection(db, "groups", currentGroupId, "messages"), {
        senderId: currentUser.uid, senderUsername: currentUser.displayName || currentUserModel?.username || 'User',
        text: input.value.trim(), isSystem: false, timestamp: serverTimestamp()
      });
      input.value = '';
    };
    window.sendImageUrl = async () => {
      const url = prompt('Masukkan URL gambar:');
      if (!url || !currentGroupId) return;
      await addDoc(collection(db, "groups", currentGroupId, "messages"), {
        senderId: currentUser.uid, senderUsername: currentUser.displayName || currentUserModel?.username || 'User',
        text: 'Mengirim gambar', imageUrl: url, isSystem: false, timestamp: serverTimestamp()
      });
    };
    window.joinGroup = async (gid) => { await updateDoc(doc(db, "groups", gid), { members: arrayUnion(currentUser.uid) }); };
    window.declareResults = async (gid) => {
      await updateDoc(doc(db, "groups", gid), { resultsDeclared: true });
      await addDoc(collection(db, "groups", gid, "messages"), { senderId: 'system', senderUsername: 'System', text: 'Hasil telah diumumkan. Hanya Judgement yang dapat mengirim pesan.', isSystem: true, timestamp: serverTimestamp() });
    };

    window.finishDebate = async (gid) => {
      const snap = await getDoc(doc(db, "groups", gid));
      if (!snap.exists()) return;
      const g = snap.data();
      const choice = prompt(`Pilih pemenang:\n1. ${g.character1}\n2. ${g.character2}`);
      if (!choice || (choice !== '1' && choice !== '2')) return;
      const winnerId = choice === '1' ? g.idDebater1 : g.idDebater2;
      const loserId = winnerId === g.idDebater1 ? g.idDebater2 : g.idDebater1;
      const batch = writeBatch(db);
      batch.update(doc(db, "groups", gid), { status: 'finished', winnerId });
      batch.update(doc(db, "users", winnerId), { wins: increment(1) });
      batch.update(doc(db, "users", loserId), { losses: increment(1) });
      await batch.commit();
      const wDoc = await getDoc(doc(db, "users", winnerId));
      const lDoc = await getDoc(doc(db, "users", loserId));
      await addDoc(collection(db, "notifications"), { title: 'Debat Selesai', body: `${wDoc.data().username} menang melawan ${lDoc.data().username}. Total menang: ${wDoc.data().wins}, kalah: ${lDoc.data().losses}.`, targetUserId: null, createdAt: serverTimestamp() });
      showPage('dashboardPage');
    };
    window.surrender = async (gid) => {
      const snap = await getDoc(doc(db, "groups", gid));
      if (!snap.exists()) return;
      const g = snap.data();
      if (currentUser.uid !== g.idDebater1 && currentUser.uid !== g.idDebater2) return;
      const winnerId = currentUser.uid === g.idDebater1 ? g.idDebater2 : g.idDebater1;
      const loserId = currentUser.uid;
      const batch = writeBatch(db);
      batch.update(doc(db, "groups", gid), { status: 'finished', winnerId });
      batch.update(doc(db, "users", winnerId), { wins: increment(1) });
      batch.update(doc(db, "users", loserId), { losses: increment(1) });
      await batch.commit();
      const wDoc = await getDoc(doc(db, "users", winnerId));
      const lDoc = await getDoc(doc(db, "users", loserId));
      await addDoc(collection(db, "notifications"), { title: 'Debat Selesai (Menyerah)', body: `${wDoc.data().username} menang karena ${lDoc.data().username} menyerah.`, targetUserId: null, createdAt: serverTimestamp() });
      showPage('dashboardPage');
    };

    window.pickDebater = async (num) => {
      const q = prompt('Cari username:');
      if (!q) return;
      const snap = await getDocs(query(collection(db, "users"), where("username", ">=", q.toLowerCase()), where("username", "<=", q.toLowerCase() + '\uf8ff')));
      if (snap.empty) return showPopup('Info', 'Tidak ditemukan');
      const user = { uid: snap.docs[0].id, ...snap.docs[0].data() };
      if (num === 1) { pickDebater1 = user; document.getElementById('debater1Info').classList.remove('hidden'); document.getElementById('debater1Info').querySelector('span').innerText = user.username; }
      else { pickDebater2 = user; document.getElementById('debater2Info').classList.remove('hidden'); document.getElementById('debater2Info').querySelector('span').innerText = user.username; }
    };
    window.createGroup = async () => {
      const t = document.getElementById('cgTitle').value, c1 = document.getElementById('cgChar1').value, c2 = document.getElementById('cgChar2').value, r = document.getElementById('cgRules').value;
      if (!t || !c1 || !c2 || !r) return showPopup('Error', 'Lengkapi data');
      if (!pickDebater1 || !pickDebater2) return showPopup('Error', 'Pilih pendebat');
      if (pickDebater1.uid === pickDebater2.uid) return showPopup('Error', 'Pendebat tidak boleh sama');
      if (currentUser.uid === pickDebater1.uid || currentUser.uid === pickDebater2.uid) return showPopup('Error', 'Judgement tidak boleh jadi pendebat');
      await addDoc(collection(db, "groups"), {
        title: t, character1: c1, character2: c2,
        character1ImageUrl: document.getElementById('cgChar1Img').value || null,
        character2ImageUrl: document.getElementById('cgChar2Img').value || null,
        groupPhotoURL: document.getElementById('cgGroupImg').value || null,
        idJudgement: currentUser.uid, idDebater1: pickDebater1.uid, idDebater2: pickDebater2.uid,
        rules: r, status: 'active', resultsDeclared: false, winnerId: null,
        createdAt: serverTimestamp(), members: [currentUser.uid, pickDebater1.uid, pickDebater2.uid]
      });
      pickDebater1 = null; pickDebater2 = null;
      document.getElementById('debater1Info').classList.add('hidden');
      document.getElementById('debater2Info').classList.add('hidden');
      showPage('dashboardPage');
    };

    function loadLobbies() {
      onSnapshot(query(collection(db, "lobbies"), orderBy("createdAt", "desc")), snap => {
        document.getElementById('lobbyList').innerHTML = snap.docs.map(d => {
          const l = d.data(); l.id = d.id;
          return `<div class="card"><b>${l.creatorUsername} mencari lawan</b><br>Karakter: ${l.characterNeeded} | Tier: ${l.tier}<br>${l.judgeName ? `Judge: ${l.judgeName}<br>` : ''}${l.roomLink ? `Room: ${l.roomLink}<br>` : ''}${l.creatorId === currentUser.uid ? `<button class="btn btn-sm btn-danger" onclick="deleteLobby('${l.id}')">Hapus</button>` : ''}</div>`;
        }).join('') || '<p style="color:var(--text-dim)">Belum ada iklan pencarian</p>';
      });
    }
    window.createLobby = async () => {
      const c = document.getElementById('clChar').value, t = document.getElementById('clTier').value;
      if (!c || !t) return showPopup('Error', 'Isi karakter dan tier');
      await addDoc(collection(db, "lobbies"), { creatorId: currentUser.uid, creatorUsername: currentUserModel?.username || currentUser.displayName || 'User', characterNeeded: c, tier: t, judgeName: document.getElementById('clJudge').value || null, roomLink: document.getElementById('clRoom').value || null, createdAt: serverTimestamp() });
      showPage('lobbyPage');
    };
    window.deleteLobby = async (id) => { await deleteDoc(doc(db, "lobbies", id)); };

    async function loadProfile() {
      if (!currentUser) return;
      const snap = await getDoc(doc(db, "users", currentUser.uid));
      if (!snap.exists()) return;
      const u = snap.data();
      document.getElementById('profileName').innerText = u.username;
      document.getElementById('profileEmail').innerText = currentUser.email;
      document.getElementById('profileWins').innerText = u.wins || 0;
      document.getElementById('profileLosses').innerText = u.losses || 0;
      document.getElementById('profilePic').innerHTML = u.photoURL ? `<img src="${u.photoURL}" style="width:140px;height:140px;border-radius:50%;object-fit:cover">` : (u.username[0] || '?').toUpperCase();
    }
    function loadEditProfile() {
      if (!currentUserModel) return;
      document.getElementById('epUrl').value = currentUserModel.photoURL || '';
      document.getElementById('epUser').value = currentUserModel.username || '';
    }
    window.saveProfile = async () => {
      const name = document.getElementById('epUser').value.trim(), url = document.getElementById('epUrl').value.trim();
      if (!name) return showPopup('Error', 'Username tidak boleh kosong');
      const last = currentUserModel.lastUsernameChange?.toDate();
      if (last && (new Date() - last) < 30 * 24 * 60 * 60 * 1000) return showPopup('Error', 'Username hanya bisa diganti setiap 30 hari');
      await updateDoc(doc(db, "users", currentUser.uid), { username: name, photoURL: url || null, lastUsernameChange: name !== currentUserModel.username ? serverTimestamp() : currentUserModel.lastUsernameChange });
      const snap = await getDoc(doc(db, "users", currentUser.uid));
      if (snap.exists()) currentUserModel = { uid: currentUser.uid, ...snap.data() };
      showPage('profilePage');
    };

    function loadNotifications() {
      if (!currentUser) return;
      onSnapshot(query(collection(db, "notifications"), orderBy("createdAt", "desc")), snap => {
        document.getElementById('notifList').innerHTML = snap.docs.filter(d => d.data().targetUserId === null || d.data().targetUserId === currentUser.uid).map(d => `<div class="card"><b>${d.data().title}</b><br>${d.data().body}</div>`).join('') || '<p style="color:var(--text-dim)">Tidak ada notifikasi</p>';
      });
    }

    window.adminTab = (tab) => {
      document.querySelectorAll('#adminPage .tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
      if (tab === 'announce') loadAdminAnnouncements();
      else if (tab === 'notif') loadAdminNotif();
      else loadAdminUsers();
    };
    async function loadAdminAnnouncements() {
      document.getElementById('adminContent').innerHTML = `<input id="annTitle" class="input" placeholder="Judul Pengumuman"><br><textarea id="annBody" class="input" rows="3" placeholder="Isi Pengumuman"></textarea><button class="btn btn-sm btn-primary" onclick="addAnnouncement()">Kirim Pengumuman</button><div id="announceList" style="margin-top:24px"></div>`;
      onSnapshot(query(collection(db, "announcements"), orderBy("createdAt", "desc")), snap => { document.getElementById('announceList').innerHTML = snap.docs.map(d => `<div class="card"><b>${d.data().title}</b><br>${d.data().body}<br><button class="btn btn-sm btn-danger" onclick="deleteAnnouncement('${d.id}')">Hapus</button></div>`).join(''); });
    }
    window.addAnnouncement = async () => {
      const t = document.getElementById('annTitle').value.trim(), b = document.getElementById('annBody').value.trim();
      if (!t || !b) return;
      await addDoc(collection(db, "announcements"), { title: t, body: b, createdAt: serverTimestamp() });
      document.getElementById('annTitle').value = ''; document.getElementById('annBody').value = '';
    };
    window.deleteAnnouncement = async (id) => { await deleteDoc(doc(db, "announcements", id)); };
    async function loadAdminNotif() {
      document.getElementById('adminContent').innerHTML = `<input id="notifTitle" class="input" placeholder="Judul Notifikasi"><br><textarea id="notifBody" class="input" rows="3" placeholder="Isi Notifikasi"></textarea><select id="notifTarget" class="input"><option value="">Semua pengguna</option></select><button class="btn btn-sm btn-primary" onclick="sendNotif()">Kirim Notifikasi</button>`;
      const snap = await getDocs(collection(db, "users")), sel = document.getElementById('notifTarget');
      snap.forEach(d => { const u = d.data(); sel.innerHTML += `<option value="${d.id}">${u.username}</option>`; });
    }
    window.sendNotif = async () => {
      const t = document.getElementById('notifTitle').value.trim(), b = document.getElementById('notifBody').value.trim(), target = document.getElementById('notifTarget').value || null;
      if (!t || !b) return;
      await addDoc(collection(db, "notifications"), { title: t, body: b, targetUserId: target, createdAt: serverTimestamp() });
      document.getElementById('notifTitle').value = ''; document.getElementById('notifBody').value = '';
      showPopup('Sukses', 'Notifikasi dikirim');
    };

    function loadAdminUsers() {
      onSnapshot(collection(db, "users"), snap => {
        document.getElementById('adminContent').innerHTML = snap.docs.map(d => {
          const u = d.data(); u.uid = d.id;
          return `<div class="card row" style="justify-content:space-between;flex-wrap:wrap;gap:10px"><div><b>${u.username}</b><br><small style="color:var(--text-dim)">${u.email}</small></div><div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-sm ${u.banned?'btn-outline':'btn-danger'}" onclick="toggleBan('${u.uid}',${u.banned})">${u.banned ? 'Unban' : 'Ban'}</button>
            <button class="btn btn-sm btn-outline" onclick="toggleAdmin('${u.uid}','${u.role}')">${u.role === 'admin' ? 'Hapus Admin' : 'Jadikan Admin'}</button>
            <button class="btn btn-sm btn-danger" onclick="deleteUser('${u.uid}')">Hapus</button></div></div>`;
        }).join('');
      });
    }
    window.toggleBan = async (uid, banned) => { await updateDoc(doc(db, "users", uid), { banned: !banned }); };
    window.toggleAdmin = async (uid, role) => { await updateDoc(doc(db, "users", uid), { role: role === 'admin' ? 'user' : 'admin' }); };
    window.deleteUser = async (uid) => { if (confirm('Hapus data pengguna?')) await deleteDoc(doc(db, "users", uid)); };

    function showPopup(title, message) {
      const overlay = document.createElement('div');
      overlay.className = 'popup-overlay';
      overlay.innerHTML = `<div class="popup"><h3>${title}</h3><p style="color:var(--text-secondary);line-height:1.7">${message}</p><div class="popup-buttons"><button class="btn btn-sm btn-primary" onclick="this.closest('.popup-overlay').remove()">OK</button></div></div>`;
      document.body.appendChild(overlay);
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    }
    window.showPopup = showPopup;
  </script>
</body>
</html>
