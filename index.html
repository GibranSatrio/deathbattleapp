<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
  <title>Death Battle · Debat Epik 3D</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@500;600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --void:#000; --abyss:#020202; --deep:#060606; --surface:#0c0c0c; --elevated:#141414; --overlay:#1c1c1c;
      --border-dim:rgba(255,255,255,0.015); --border-subtle:rgba(255,255,255,0.04); --border-medium:rgba(255,255,255,0.08);
      --text-dim:#505050; --text-secondary:#7a7a7a; --text-primary:#acacac; --text-bright:#eaeaea;
      --accent-red:#ff4d5a; --accent-green:#4caf50; --accent-gold:#e0b040;
      --glass-bg:rgba(6,6,6,0.6); --glass-bg-hover:rgba(12,12,12,0.76);
      --glass-border:rgba(255,255,255,0.02); --glass-border-hover:rgba(255,255,255,0.07);
      --shadow-1:0 16px 34px rgba(0,0,0,0.92),0 3px 16px rgba(0,0,0,0.74);
      --shadow-2:0 24px 56px rgba(0,0,0,0.96),0 5px 24px rgba(0,0,0,0.82);
      --shadow-3:0 38px 72px rgba(0,0,0,0.98),0 8px 32px rgba(0,0,0,0.92);
      --shadow-inset:inset 0 1px 0 rgba(255,255,255,0.01);
      --font-body:'Inter',system-ui,-apple-system,sans-serif; --font-display:'Orbitron','Rajdhani',sans-serif;
      --radius-sm:10px; --radius-md:16px; --radius-lg:24px; --radius-xl:32px; --radius-full:9999px;
      --transition-fast:0.18s cubic-bezier(0.4,0,0.2,1); --transition-smooth:0.38s cubic-bezier(0.25,0.8,0.25,1);
      --transition-bounce:0.65s cubic-bezier(0.34,1.56,0.64,1);
    }
    body {
      font-family:var(--font-body); background:var(--void); color:var(--text-primary);
      height:100vh; height:100dvh; overflow:hidden; -webkit-font-smoothing:antialiased; perspective:1800px;
      background-image:radial-gradient(ellipse at 50% 30%,rgba(255,255,255,0.005) 0%,transparent 65%),radial-gradient(ellipse at 50% 70%,rgba(255,255,255,0.005) 0%,transparent 65%),url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.08' numOctaves='6' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.1'/%3E%3C/svg%3E");
      background-attachment:fixed;
    }
    .page { display:none; flex-direction:column; height:100vh; height:100dvh; animation:pageReveal 0.75s ease both; }
    .page.active { display:flex; }
    @keyframes pageReveal { from{opacity:0;transform:translateY(72px)scale(0.84)rotateX(8deg);filter:blur(28px);} to{opacity:1;transform:translateY(0)scale(1)rotateX(0deg);filter:blur(0);} }
    .header { background:rgba(0,0,0,0.84); backdrop-filter:blur(65px); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.015); box-shadow:0 14px 52px rgba(0,0,0,0.99); z-index:10; }
    .container { flex:1; overflow-y:auto; padding:24px 20px; max-width:820px; margin:auto; width:100%; }
    .btn { background:rgba(12,12,12,0.74); backdrop-filter:blur(24px); color:var(--text-bright); border:1px solid rgba(255,255,255,0.05); padding:14px 24px; border-radius:var(--radius-md); cursor:pointer; font-weight:600; width:100%; text-align:center; margin:5px 0; transition:all var(--transition-smooth); box-shadow:var(--shadow-1); }
    .btn:hover { background:rgba(20,20,20,0.88); border-color:rgba(255,255,255,0.11); transform:translateY(-7px); box-shadow:var(--shadow-2); }
    .btn-primary { background:linear-gradient(145deg,#3d3d3d,#222,#141414); border-color:rgba(255,255,255,0.1); font-weight:700; }
    .btn-outline { background:transparent; border:1.5px solid rgba(255,255,255,0.06); }
    .btn-danger { color:var(--accent-red); border-color:rgba(255,77,90,0.2); }
    .input,textarea { background:rgba(4,4,4,0.8); backdrop-filter:blur(22px); border:1.5px solid rgba(255,255,255,0.02); color:var(--text-bright); padding:14px 18px; border-radius:var(--radius-md); width:100%; margin:7px 0; }
    .card { background:rgba(8,8,8,0.64); backdrop-filter:blur(28px); border:1px solid rgba(255,255,255,0.015); border-radius:var(--radius-lg); padding:20px; margin-bottom:18px; box-shadow:var(--shadow-1); transition:all var(--transition-bounce); }
    .card:hover { transform:translateY(-12px) rotateX(4.5deg) scale(1.04); box-shadow:var(--shadow-3); }
    .avatar { width:66px; height:66px; border-radius:50%; background:linear-gradient(145deg,#3e3e3e,#1e1e1e); display:flex; align-items:center; justify-content:center; font-weight:700; font-family:var(--font-display); font-size:1.5rem; border:2px solid rgba(255,255,255,0.06); }
    .row { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
    .fab { position:fixed; bottom:40px; right:40px; width:70px; height:70px; border-radius:50%; background:linear-gradient(145deg,#3e3e3e,#1f1f1f); border:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:center; font-size:38px; cursor:pointer; box-shadow:var(--shadow-2); z-index:30; transition:all var(--transition-bounce); color:#fff; }
    .fab:hover { transform:scale(1.26)rotate(22deg)translateZ(16px); box-shadow:var(--shadow-3); }
    .popup-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.95); backdrop-filter:blur(28px); display:flex; align-items:center; justify-content:center; z-index:1000; animation:fadeIn 0.25s ease; }
    .popup { background:rgba(32,32,32,0.96); backdrop-filter:blur(40px); border:1px solid rgba(255,255,255,0.045); border-radius:var(--radius-xl); padding:40px 36px; max-width:500px; width:92%; box-shadow:var(--shadow-3); animation:popupReveal 0.7s ease; }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
    @keyframes popupReveal { from{transform:scale(0.45)translateY(100px)rotateX(20deg);opacity:0;filter:blur(22px);} to{transform:scale(1)translateY(0)rotateX(0deg);opacity:1;filter:blur(0);} }
    .picker-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.9); backdrop-filter:blur(24px); display:flex; align-items:center; justify-content:center; z-index:2000; }
    .picker-box { background:rgba(24,24,24,0.95); backdrop-filter:blur(32px); border:1px solid rgba(255,255,255,0.06); border-radius:var(--radius-xl); padding:28px; max-width:450px; width:90%; max-height:80vh; overflow-y:auto; box-shadow:var(--shadow-3); animation:popupReveal 0.5s ease; }
    .hidden { display:none!important; }
  </style>
</head>
<body>
  <div id="app">
    <!-- LOGIN PAGE -->
    <div id="loginPage" class="page active container" style="justify-content:center;text-align:center">
      <div style="max-width:500px;width:100%">
        <div style="font-size:5em;margin-bottom:20px;color:#fefefe;text-shadow:0 14px 44px rgba(0,0,0,0.99);"><i class="fas fa-fist-raised"></i></div>
        <h1 style="font-family:var(--font-display);letter-spacing:0.2em;font-size:3.5rem;background:linear-gradient(180deg,#fff,#c4c4c4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">DEATH BATTLE</h1>
        <input id="loginEmail" class="input" type="email" placeholder="Email">
        <input id="loginPass" class="input" type="password" placeholder="Password">
        <button class="btn btn-primary" onclick="loginEmail()">Masuk</button>
        <button class="btn btn-outline" onclick="loginGoogle()"><i class="fab fa-google"></i> Google</button>
        <button class="btn btn-link" onclick="showPage('registerPage')">Daftar</button>
      </div>
    </div>
    <!-- REGISTER PAGE -->
    <div id="registerPage" class="page container" style="justify-content:center">
      <div style="max-width:500px;width:100%">
        <h2 style="font-family:var(--font-display);text-align:center">Daftar</h2>
        <input id="regEmail" class="input" type="email" placeholder="Email">
        <input id="regUser" class="input" placeholder="Username">
        <input id="regPass" class="input" type="password" placeholder="Password">
        <button class="btn btn-primary" onclick="register()">Daftar</button>
        <button class="btn btn-outline" onclick="showPage('loginPage')">Kembali</button>
      </div>
    </div>
    <!-- DASHBOARD PAGE -->
    <div id="dashboardPage" class="page">
      <div class="header">
        <h2><i class="fas fa-fist-raised"></i> DEATH BATTLE</h2>
        <div class="row">
          <span id="notifBadge" class="badge hidden" style="position:relative;top:auto;right:auto;background:#ff4d5a;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-weight:700;">0</span>
          <button class="icon-btn" onclick="showPage('notifPage')"><i class="fas fa-bell"></i></button>
          <button id="adminBtn" class="icon-btn hidden" onclick="showPage('adminPage')"><i class="fas fa-shield-haltered"></i></button>
          <button class="icon-btn" onclick="showPage('profilePage')"><i class="fas fa-user-astronaut"></i></button>
        </div>
      </div>
      <div class="container">
        <div id="announceBanner" class="card hidden"></div>
        <div class="row" style="justify-content:space-between;margin:24px 0"><h3>Arena Debat</h3><span id="onlineCount"></span></div>
        <button class="btn btn-outline" onclick="showPage('lobbyPage')">Cari Lawan</button>
        <h4>Debat Aktif</h4>
        <div id="groupList"></div>
      </div>
      <div class="fab" onclick="showPage('createGroupPage')"><i class="fas fa-plus"></i></div>
    </div>
    <!-- CREATE GROUP PAGE -->
    <div id="createGroupPage" class="page container">
      <div class="header"><button onclick="showPage('dashboardPage')"><i class="fas fa-arrow-left"></i></button><h2>Buat Debat</h2><span></span></div>
      <input id="cgTitle" class="input" placeholder="Judul Debat">
      <textarea id="cgRules" class="input" rows="3" placeholder="Aturan"></textarea>
      <div id="debaterSlots"></div>
      <button class="btn btn-sm btn-outline" onclick="addDebaterSlot()">+ Tambah Pendebat</button>
      <button class="btn btn-primary" onclick="createGroup()">Mulai Debat</button>
    </div>
    <!-- GROUP DETAIL PAGE -->
    <div id="groupDetailPage" class="page">
      <div class="header"><button onclick="showPage('dashboardPage')"><i class="fas fa-arrow-left"></i></button><h3 id="gdTitle"></h3><div id="gdActions"></div></div>
      <div id="chatArea" class="container" style="flex:1;"></div>
      <div class="container" style="display:flex;gap:10px"><input id="chatInput" class="input" placeholder="Ketik..."><button class="btn btn-sm" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button></div>
    </div>
    <!-- PROFILE PAGE -->
    <div id="profilePage" class="page container" style="justify-content:center;text-align:center">
      <div id="profilePic" class="avatar" style="width:120px;height:120px;font-size:3rem;margin:auto;"></div>
      <h3 id="profileName"></h3>
      <p id="profileEmail"></p>
      <div class="row" style="justify-content:center;gap:48px;margin:24px 0"><div><b id="profileWins">0</b><br>Menang</div><div><b id="profileLosses">0</b><br>Kalah</div></div>
      <button class="btn btn-outline" onclick="showPage('editProfilePage')">Edit Profil</button>
      <button class="btn btn-outline btn-danger" onclick="signOut()">Keluar</button>
    </div>
    <!-- EDIT PROFILE PAGE -->
    <div id="editProfilePage" class="page container" style="justify-content:center">
      <input id="epUrl" class="input" placeholder="URL Foto Profil">
      <input id="epUser" class="input" placeholder="Username">
      <button class="btn btn-primary" onclick="saveProfile()">Simpan</button>
      <button class="btn btn-outline" onclick="showPage('profilePage')">Kembali</button>
    </div>
    <!-- NOTIFICATIONS PAGE -->
    <div id="notifPage" class="page container"><div class="header"><button onclick="showPage('dashboardPage')"><i class="fas fa-arrow-left"></i></button><h2>Notifikasi</h2></div><div id="notifList"></div></div>
    <!-- ADMIN PAGE -->
    <div id="adminPage" class="page container"><div class="header"><button onclick="showPage('dashboardPage')"><i class="fas fa-arrow-left"></i></button><h2>Admin</h2></div><div class="tabs"><div class="tab active" onclick="adminTab('announce')">Pengumuman</div><div class="tab" onclick="adminTab('users')">Pengguna</div></div><div id="adminContent"></div></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, query, where, orderBy, serverTimestamp, increment, arrayUnion, writeBatch, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { apiKey:"AIzaSyAaqhwVyiFRkYSMjtCQlgGGrsZBBIgHJiM", authDomain:"death-aec26.firebaseapp.com", projectId:"death-aec26", storageBucket:"death-aec26.firebasestorage.app", messagingSenderId:"957128428992", appId:"1:957128428992:web:72e1573167fc8500f54c25" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    let currentUser=null, currentUserModel=null, currentGroupId=null;
    let debaterSlots = []; // array of {userId, characterName, imageUrl}

    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        await updateDoc(doc(db,"users",user.uid), { lastSeen: serverTimestamp() });
        const snap = await getDoc(doc(db,"users",user.uid));
        if (snap.exists()) {
          currentUserModel = { uid:user.uid, ...snap.data() };
          if (currentUserModel.banned) { await signOut(auth); return; }
          document.getElementById('adminBtn').classList.toggle('hidden', currentUserModel.role!=='admin');
        }
        showPage('dashboardPage');
      } else {
        currentUserModel = null;
        document.getElementById('adminBtn').classList.add('hidden');
        showPage('loginPage');
      }
    });

    window.showPage = (id) => {
      document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      if (id==='dashboardPage') loadDashboard();
      if (id==='groupDetailPage') loadGroupDetail();
      if (id==='profilePage') loadProfile();
      if (id==='editProfilePage') loadEditProfile();
      if (id==='notifPage') loadNotifications();
      if (id==='adminPage') adminTab('announce');
      if (id==='createGroupPage') initDebaterSlots();
    };

    window.loginEmail = async () => {
      try { await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPass').value); }
      catch(e) { showPopup('Login Gagal', e.message); }
    };
    window.loginGoogle = async () => {
      try { await signInWithPopup(auth, googleProvider); }
      catch(e) { showPopup('Google Login Gagal', e.message); }
    };
    window.register = async () => {
      const email = document.getElementById('regEmail').value, pass = document.getElementById('regPass').value, username = document.getElementById('regUser').value;
      if(!email||!pass||!username) return showPopup('Error','Isi semua field');
      try {
        const res = await createUserWithEmailAndPassword(auth, email, pass);
        await setDoc(doc(db,"users",res.user.uid), { email, username, wins:0, losses:0, lastUsernameChange:serverTimestamp(), lastSeen:serverTimestamp(), role:'user', banned:false });
        // Auto login dan pindah ke dashboard
        await signInWithEmailAndPassword(auth, email, pass);
        showPopup('Sukses', `Selamat datang, ${username}!`);
      } catch(e) { showPopup('Daftar Gagal', e.message); }
    };
    window.signOut = () => signOut(auth);

    function loadDashboard() {
      const fiveMin = new Date(Date.now()-300000);
      onSnapshot(query(collection(db,"users"),where("lastSeen",">=",fiveMin)), snap => {
        document.getElementById('onlineCount').innerHTML = `<i class="fas fa-circle" style="color:#4caf50;font-size:10px"></i> ${snap.size} online`;
      });
      onSnapshot(collection(db,"users"), snap => {
        const users = snap.docs.map(d=>({id:d.id,...d.data()}));
        window.allUsers = { online: users.filter(u=>u.lastSeen?.toDate()>fiveMin), offline: users.filter(u=>!u.lastSeen||u.lastSeen.toDate()<=fiveMin) };
      });
      onSnapshot(query(collection(db,"groups"),where("status","==","active"),orderBy("createdAt","desc")), snap => {
        document.getElementById('groupList').innerHTML = snap.docs.map(d=>{
          const g=d.data(); g.id=d.id;
          return `<div class="card" onclick="openGroup('${g.id}')"><b>${g.title}</b><br>${g.debaters?.map(d=>d.characterName).join(' vs ')||'?'}</div>`;
        }).join('')||'<p>Belum ada debat</p>';
      });
    }
    window.openGroup = (id) => { currentGroupId=id; showPage('groupDetailPage'); };

    function loadGroupDetail() {
      if(!currentGroupId) return;
      onSnapshot(doc(db,"groups",currentGroupId), snap => {
        const g = snap.data(); if(!g) return;
        document.getElementById('gdTitle').innerText = g.title;
        let act = '';
        if(currentUser.uid===g.idJudgement && g.status==='active') act += `<button onclick="finishDebate('${currentGroupId}')">Selesai</button>`;
        document.getElementById('gdActions').innerHTML = act;
      });
      onSnapshot(query(collection(db,"groups",currentGroupId,"messages"),orderBy("timestamp")), snap => {
        document.getElementById('chatArea').innerHTML = snap.docs.map(d=>{
          const m=d.data();
          return `<div class="chat-bubble ${m.senderId===currentUser.uid?'my-msg':'other-msg'}"><b>${m.senderUsername}</b><br>${m.text}</div>`;
        }).join('');
      });
    }
    window.sendMessage = async () => {
      const input = document.getElementById('chatInput');
      if(!input.value.trim()||!currentGroupId) return;
      await addDoc(collection(db,"groups",currentGroupId,"messages"), {
        senderId:currentUser.uid, senderUsername:currentUserModel?.username||currentUser.displayName||'User',
        text:input.value.trim(), timestamp:serverTimestamp()
      });
      input.value='';
    };

    // Debater slots dinamis
    function initDebaterSlots() {
      debaterSlots = [{userId:null, characterName:'', imageUrl:''}, {userId:null, characterName:'', imageUrl:''}];
      renderSlots();
    }
    window.addDebaterSlot = () => {
      if(debaterSlots.length>=5) return showPopup('Info','Maksimal 5 pendebat');
      debaterSlots.push({userId:null, characterName:'', imageUrl:''});
      renderSlots();
    };
    function renderSlots() {
      const container = document.getElementById('debaterSlots');
      container.innerHTML = debaterSlots.map((slot,i)=>`
        <div class="card" style="margin-bottom:10px">
          <div class="row" style="justify-content:space-between">
            <b>Pendebat ${i+1}</b>
            <button class="btn btn-sm btn-danger" onclick="removeDebaterSlot(${i})">Hapus</button>
          </div>
          <input class="input charName" placeholder="Nama Karakter" value="${slot.characterName}" onchange="updateSlot(${i},'characterName',this.value)">
          <input class="input charImg" placeholder="URL Gambar (opsional)" value="${slot.imageUrl}" onchange="updateSlot(${i},'imageUrl',this.value)">
          <button class="btn btn-sm btn-outline" onclick="pickDebaterForSlot(${i})">${slot.userId ? 'Ganti User' : 'Pilih User'}</button>
          ${slot.userId ? `<p style="color:var(--accent-green)">User: ${window.allUsers?.online.concat(window.allUsers?.offline||[]).find(u=>u.uid===slot.userId)?.username||slot.userId}</p>` : ''}
        </div>
      `).join('');
    }
    window.removeDebaterSlot = (i) => {
      if(debaterSlots.length<=2) return showPopup('Info','Minimal 2 pendebat');
      debaterSlots.splice(i,1);
      renderSlots();
    };
    window.updateSlot = (i, key, val) => { debaterSlots[i][key]=val; };
    window.pickDebaterForSlot = (i) => {
      if(!window.allUsers) return showPopup('Info','Data pengguna belum siap.');
      const {online, offline} = window.allUsers;
      const all = [...online, ...offline];
      const overlay = document.createElement('div');
      overlay.className='picker-overlay';
      overlay.innerHTML = `<div class="picker-box"><h3>Pilih User</h3>
        <div>${all.map(u=>`<div class="picker-item" data-uid="${u.uid}" style="padding:10px;cursor:pointer;border-bottom:1px solid #333;">
          <span>${u.username}</span> <span style="color:${online.includes(u)?'#4caf50':'#666'}">${online.includes(u)?'Online':'Offline'}</span>
        </div>`).join('')}</div>
        <button class="btn btn-sm btn-outline" onclick="this.closest('.picker-overlay').remove()">Batal</button>
      </div>`;
      document.body.appendChild(overlay);
      overlay.querySelectorAll('.picker-item').forEach(item=>{
        item.addEventListener('click', ()=>{
          const uid = item.dataset.uid;
          const selected = all.find(u=>u.uid===uid);
          if(selected.uid===currentUser.uid) return showPopup('Info','Tidak bisa pilih diri sendiri');
          debaterSlots[i].userId = uid;
          renderSlots();
          overlay.remove();
        });
      });
      overlay.addEventListener('click', (e)=>{ if(e.target===overlay) overlay.remove(); });
    };
    window.createGroup = async () => {
      const title = document.getElementById('cgTitle').value.trim();
      const rules = document.getElementById('cgRules').value.trim();
      if(!title||!rules) return showPopup('Error','Judul dan aturan wajib');
      const validSlots = debaterSlots.filter(s=>s.userId&&s.characterName);
      if(validSlots.length<2) return showPopup('Error','Minimal 2 pendebat dengan user dan karakter');
      await addDoc(collection(db,"groups"), {
        title, rules, idJudgement: currentUser.uid,
        debaters: validSlots.map(s=>({userId:s.userId, characterName:s.characterName, imageUrl:s.imageUrl||null})),
        status:'active', resultsDeclared:false, winnerId:null,
        createdAt:serverTimestamp(), members:[currentUser.uid, ...validSlots.map(s=>s.userId)]
      });
      showPage('dashboardPage');
    };

    window.finishDebate = async (gid) => {
      const snap = await getDoc(doc(db,"groups",gid));
      const g = snap.data();
      const debaters = g.debaters;
      const choice = prompt(`Pilih pemenang:\n${debaters.map((d,i)=>`${i+1}. ${d.characterName}`).join('\n')}`);
      if(!choice) return;
      const idx = parseInt(choice)-1;
      if(idx<0||idx>=debaters.length) return;
      const winnerId = debaters[idx].userId;
      await updateDoc(doc(db,"groups",gid), { status:'finished', winnerId });
      // Update stats sederhana
      const winnerDoc = await getDoc(doc(db,"users",winnerId));
      await updateDoc(doc(db,"users",winnerId), { wins: increment(1) });
      for(const d of debaters) {
        if(d.userId!==winnerId) await updateDoc(doc(db,"users",d.userId), { losses: increment(1) });
      }
      showPage('dashboardPage');
    };

    async function loadProfile() {
      if(!currentUser) return;
      const snap = await getDoc(doc(db,"users",currentUser.uid));
      if(!snap.exists()) return;
      const u = snap.data();
      document.getElementById('profileName').innerText = u.username;
      document.getElementById('profileEmail').innerText = currentUser.email;
      document.getElementById('profileWins').innerText = u.wins||0;
      document.getElementById('profileLosses').innerText = u.losses||0;
      const pic = document.getElementById('profilePic');
      if(u.photoURL) pic.innerHTML = `<img src="${u.photoURL}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
      else pic.innerText = (u.username||'?')[0].toUpperCase();
    }
    function loadEditProfile() {
      if(!currentUserModel) return;
      document.getElementById('epUrl').value = currentUserModel.photoURL||'';
      document.getElementById('epUser').value = currentUserModel.username||'';
    }
    window.saveProfile = async () => {
      const name = document.getElementById('epUser').value.trim();
      const url = document.getElementById('epUrl').value.trim();
      if(!name) return showPopup('Error','Username tidak boleh kosong');
      await updateDoc(doc(db,"users",currentUser.uid), { username:name, photoURL:url||null });
      const snap = await getDoc(doc(db,"users",currentUser.uid));
      if(snap.exists()) currentUserModel = { uid:currentUser.uid, ...snap.data() };
      showPage('profilePage');
    };

    function loadNotifications() {
      if(!currentUser) return;
      onSnapshot(query(collection(db,"notifications"),orderBy("createdAt","desc")), snap => {
        document.getElementById('notifList').innerHTML = snap.docs.filter(d=>d.data().targetUserId===null||d.data().targetUserId===currentUser.uid).map(d=>`<div class="card"><b>${d.data().title}</b><br>${d.data().body}</div>`).join('')||'<p>Tidak ada notifikasi</p>';
      });
    }

    window.adminTab = (tab) => {
      if(tab==='announce') {
        document.getElementById('adminContent').innerHTML = `<input id="annTitle" class="input" placeholder="Judul"><textarea id="annBody" class="input" rows="3" placeholder="Isi"></textarea><button class="btn btn-sm btn-primary" onclick="addAnnouncement()">Kirim</button>`;
      } else {
        onSnapshot(collection(db,"users"), snap => {
          document.getElementById('adminContent').innerHTML = snap.docs.map(d=>{
            const u=d.data(); u.uid=d.id;
            return `<div class="card row"><div><b>${u.username}</b><br>${u.email}</div><div><button class="btn btn-sm btn-danger" onclick="toggleBan('${u.uid}',${u.banned})">${u.banned?'Unban':'Ban'}</button></div></div>`;
          }).join('');
        });
      }
    };
    window.addAnnouncement = async () => {
      const t=document.getElementById('annTitle').value, b=document.getElementById('annBody').value;
      if(!t||!b) return;
      await addDoc(collection(db,"announcements"), { title:t, body:b, createdAt:serverTimestamp() });
      showPopup('Sukses','Dikirim');
    };
    window.toggleBan = async (uid,banned) => { await updateDoc(doc(db,"users",uid), { banned:!banned }); };

    function showPopup(title, message) {
      const overlay = document.createElement('div');
      overlay.className='popup-overlay';
      overlay.innerHTML = `<div class="popup"><h3>${title}</h3><p>${message}</p><button class="btn btn-sm btn-primary" onclick="this.closest('.popup-overlay').remove()">OK</button></div>`;
      document.body.appendChild(overlay);
      overlay.addEventListener('click', (e)=>{ if(e.target===overlay) overlay.remove(); });
    }
    window.showPopup = showPopup;

    // Inisialisasi slot awal
    window.addEventListener('load', ()=> {
      if(document.getElementById('createGroupPage').classList.contains('active')) initDebaterSlots();
    });
  </script>
</body>
</html>
